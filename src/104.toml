id = "104"
question = "What is required to the worthy receiving of the Lord's supper?"

[[sections]]
text = "It is required of them that would worthily partake of the Lord's supper, that they examine themselves of their knowledge to discern the Lord's body, of their faith to feed upon him, of their repentance, love, and new obedience; lest coming unworthily, they eat and drink judgment to themselves."
verses = "1 Corinthians 11:28, 29; 2 Corinthians 13:5; 1 Corinthians 11:31; 1 Corinthians 10:16, 17; 1 Corinthians 5:7, 8; 1 Corinthians 11:28, 29"

id = "91"
question = "What is faith in Jesus Christ?"

[[sections]]
text = "Faith in Jesus Christ is a saving grace, by which we receive and rest upon him alone for salvation, as he is offered to us in the gospel."
verses = "Hebrews 10:39; John 1:12; Isaiah 26:3, 4; Philippians 3:9; Galatians 2:16"

id = "64"
question = "Which day of the seven has God appointed to be the weekly Sabbath?"

[[sections]]
text = "Before the resurrection of Christ, God appointed the seventh day of the week to be the weekly Sabbath; and the first day of the week ever since, to continue to the end of the world, which is the Christian Sabbath."
verses = "Exodus 20:8-11; Deuteronomy 5:12-14; Psalms 118:24; Matthew 28:1; Mark 2:27, 28; John 20:19, 20, 26; Revelation 1:10; Mark 16:2; Luke 24:1, 30-36; John 20:1; Acts 1:3; 2:1, 2; 20:7; 1 Corinthians 16:1, 2"

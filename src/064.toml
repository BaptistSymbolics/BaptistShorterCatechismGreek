id = "64"
question = "Ποια ημέρα από τις επτά όρισε ο Θεός ως εβδομαδιαίο Σάββατο;"

[[sections]]
text = "Πριν από την ανάσταση του Χριστού, ο Θεός όρισε την έβδομη ημέρα της εβδομάδας ως εβδομαδιαίο Σάββατο· και από τότε την πρώτη ημέρα της εβδομάδας, η οποία θα συνεχίσει μέχρι το τέλος του κόσμου, και είναι το χριστιανικό Σάββατο."
verses = "Exodus 20:8-11; Deuteronomy 5:12-14; Psalms 118:24; Matthew 28:1; Mark 2:27, 28; John 20:19, 20, 26; Revelation 1:10; Mark 16:2; Luke 24:1, 30-36; John 20:1; Acts 1:3; 2:1, 2; 20:7; 1 Corinthians 16:1, 2"

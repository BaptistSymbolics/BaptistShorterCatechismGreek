id = "14"
question = "What are God's works of providence?"

[[sections]]
text = "God's works of providence are his most holy, wise, and powerful preserving and governing all his creatures, and all their actions."
verses = "Psalms 145:17; Isaiah 28:29, Psalms 104:24; Hebrews 1:3; Psalms 103:19; Matthew 10:29, 30, 31"

id = "86"
question = "What is forbidden in the tenth commandment?"

[[sections]]
text = "The tenth commandment forbids all discontentment with our own estate, envying or grieving at the good of our neighbour, and all inordinate motions and affections to anything that is his."
verses = "1 Kings 21:4; Esther 5:13; 1 Corinthians 10:10; Galatians 5:26; James 3:14, 16; Romans 7:7, 8, 13:9; Deuteronomy 5:21"

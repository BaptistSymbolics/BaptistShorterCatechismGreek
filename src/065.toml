id = "65"
question = "How is the Sabbath to be sanctified?"

[[sections]]
text = "The Sabbath is to be sanctified by a holy resting all that day, even from such worldly employments and recreations as are lawful on other days; and spending the whole time in the public and private exercises of God's worship, except so much as is to be taken up in the works of necessity and mercy."
verses = "Exodus 20:8, 10; Exodus 16:25-28; Nehemiah 13:15-22; Luke 4:16; Acts 20:7; Psalms 92; Isaiah 66:23; Matthew 12:1-13"

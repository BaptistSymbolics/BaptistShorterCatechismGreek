id = "26"
question = "What offices does Christ execute as our Redeemer?"

[[sections]]
text = "Christ as our Redeemer executes the offices of a prophet, of a priest, and of a king, both in his estate of humiliation and exaltation."
verses = "Acts 3:22; Hebrews 12:25; 2 Corinthians 13:3; Hebrews 5:5, 6, 7; 7:25; Psalms 2:6; Isaiah 9:6, 7; Matthew 21:5; Psalms 2:8-11"

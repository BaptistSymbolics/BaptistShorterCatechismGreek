id = "26"
question = "Ποια αξιώματα ασκεί ο Χριστός ως Λυτρωτής μας;"

[[sections]]
text = "Ο Χριστός ως Λυτρωτής μας ασκεί τα αξιώματα του προφήτη, του ιερέα και του βασιλιά, τόσο στην κατάσταση της ταπείνωσής του όσο και στην κατάσταση της ύψωσής του."
verses = "Acts 3:22; Hebrews 12:25; 2 Corinthians 13:3; Hebrews 5:5, 6, 7; 7:25; Psalms 2:6; Isaiah 9:6, 7; Matthew 21:5; Psalms 2:8-11"

id = "67"
question = "Ποιοι είναι οι λόγοι που προσαρτώνται στην τέταρτη εντολή;"

[[sections]]
text = "Οι λόγοι που προσαρτώνται στην τέταρτη εντολή είναι ότι ο Θεός μάς παραχωρεί έξι ημέρες της εβδομάδας για τις δικές μας νόμιμες ασχολίες, ότι διεκδικεί ιδιαίτερο δικαίωμα επί της εβδόμης ημέρας, το δικό Του παράδειγμα, και η ευλογία Του επί της ημέρας του Σαββάτου."
verses = "Exodus 20:9; Exodus 20:11"

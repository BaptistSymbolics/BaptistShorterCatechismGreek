id = "25"
question = "How did Christ, being the Son of God become man?"

[[sections]]
text = "Christ the Son of God, became man, by taking to himself a true body, and a reasonable soul; being conceived by the power of the Holy Spirit in the womb of the Virgin Mary, and born of her, yet without sin."
verses = "Hebrews 2:14, 17; 10:5; Matthew 26:38; Luke 1:27, 31, 34, 35, 42; Galatians 4:4; Hebrews 4:15; 7:26"

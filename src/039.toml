id = "39"
question = "What are the benefits which in this life do accompany or flow from justification, adoption, and sanctification?"

[[sections]]
text = "The benefits which in this life do accompany or flow from justification, adoption, and sanctification, are assurance of God's love, peace of conscience, joy in the Holy Spirit, increase of grace, and perseverance therein to the end."
verses = "Romans 5:1, 2, 5; Romans 5:5, 17; Proverbs 4:18; 1 John 5:13; 1 Peter 1:5"

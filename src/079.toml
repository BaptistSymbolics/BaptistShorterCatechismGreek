id = "79"
question = "What is required in the eighth commandment?"

[[sections]]
text = "The eighth commandment requires the lawful procuring and furthering the wealth and outward estate of ourselves and others."
verses = "Genesis 30:30; 1 Timothy 5:8; Leviticus 25:35; Deuteronomy 22:1, 2, 3, 4, 5; Exodus 23:4, 5; Genesis 47:14, 20"

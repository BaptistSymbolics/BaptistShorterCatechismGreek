id = "79"
question = "Τι απαιτεί η όγδοη εντολή;"

[[sections]]
text = "Η όγδοη εντολή απαιτεί τη νόμιμη απόκτηση και προαγωγή του πλούτου και της περιουσίας τόσο τη δική μας όσο και των άλλων."
verses = "Genesis 30:30; 1 Timothy 5:8; Leviticus 25:35; Deuteronomy 22:1, 2, 3, 4, 5; Exodus 23:4, 5; Genesis 47:14, 20"

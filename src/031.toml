id = "31"
question = "Wherein consists Christ's exaltation?"

[[sections]]
text = "Christ's exaltation consists in his rising again from the dead on the third day, in ascending up into heaven, in sitting at the right hand of God the Father, and in coming to judge the world at the last day."
verses = "1 Corinthians 15:4; Mark 16:19; Ephesians 1:20; Acts 1:11; 17:31"

name: Upload PDF Artifact

on:
  push:
    paths:
      - 'dist/*.pdf'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: baptist-shorter-catechism-greek-pdf
          path: dist/baptist-shorter-catechism-greek.pdf
